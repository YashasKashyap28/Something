[hand]
id = "service-monitor2"
name = "service_monitor_hand2"
description = "Monitors Linux services and restarts them based on status and logs"
category = "content"
icon = "receipt"
version = "1.0.0"

[exec_policy]
mode = "full"

[skills.entrypoint]
name = "entrypoint"
description = "This skill helps the agent perform X task"
path = "C:/Users/gayat/.openfang/skills"
enabled = true

     

[[hand.requires]]
key = "web_fetch"
label = "Web Fetch"
requirement_type = "binary"
check_value = "curl"

[[hand.requires]]
key = "file_write"
label = "File Write"
requirement_type = "binary"
check_value = "echo"

[[hand.requires]]
key = "file_read"
label = "File Read"
requirement_type = "binary"
check_value = "cat"

[[hand.settings]]
key = "output_format"
label = "Output Format"
type = "string"
setting_type = "select"
default = "csv"

[[hand.settings.options]]
key = "csv"
value = "csv"
label = "CSV"

[[hand.settings.options]]
key = "json"
value = "json"
label = "JSON"

[[hand.settings.options]]
key = "xlsx"
value = "xlsx"
label = "XLSX"

[[hand.settings]]
key = "auto_validate"
label = "Auto Validate"
type = "bool"
setting_type = "toggle"
default = "true"

[[hand.settings]]
key = "confidence_threshold"
label = "Confidence Threshold"
type = "float"
setting_type = "select"
default = "0.95"
min = 0.5
max = 1.0

[hand.agent]
name = "service_monitor_hand2"
description = "Monitors Linux services and restarts them based on status and logs"
#model = "gemini-2.5-flash"
system_prompt = "You are monitoring linux services. You restart a service if the service is failed for some reason"
temperature = 0.1
max_iterations = 10
 

[hand.dashboard]

[[hand.dashboard.metrics]]
key = "Monitoring completed"
label = "Monitoring Completed"
memory_key = "Monitoring Completed"